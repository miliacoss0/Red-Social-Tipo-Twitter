{% extends 'base.html' %}
{% load static %}

{% block titulo %}Mis Menciones - Red Social{% endblock %}

{% block contenido %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1>Mis Menciones</h1>
    
    <!-- Contenedor para menciones cargadas via API -->
    <div id="menciones-container"></div>
</div>

<!-- Cargar el script de API de tweets -->
<script src="{% static 'js/tweets-api.js' %}"></script>

<!-- Cargar menciones via API -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    cargarMenciones('menciones-container');
});
</script>
{% endblock %}
