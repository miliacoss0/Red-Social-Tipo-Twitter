{% extends 'base.html' %}

{% block titulo %}Tweet - Red Social{% endblock %}

{% block contenido %}
<div style="max-width: 600px; margin: 0 auto;">
    <a href="javascript:history.back()" style="color: #0366d6; text-decoration: none;">← Volver</a>
    
    <div style="border: 1px solid #e1e4e8; border-radius: 8px; padding: 15px; margin-top: 20px;">
        <div style="margin-bottom: 10px; color: #0366d6;">
            <strong>{{ tweet.author.username }}</strong>
            <small style="color: #586069;">{{ tweet.created_at|date:"d/m/Y H:i" }}</small>
        </div>
        <div style="margin-bottom: 10px; font-size: 16px;">
            {{ tweet.content|linebreaksbr }}
        </div>
        <div>
            {% for hashtag in tweet.hashtags.all %}
            <a href="{% url 'hashtag' hashtag.name %}" style="color: #0366d6; text-decoration: none; margin-right: 10px;">
                #{{ hashtag.name }}
            </a>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
