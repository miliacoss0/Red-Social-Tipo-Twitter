{% extends 'base.html' %}
{% load static %}

{% block titulo %}Buscar - Red Social{% endblock %}

{% block contenido %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1>Buscador</h1>
    
    <!-- Formulario de busqueda con id para interceptar -->
    <form id="search-form" style="display: flex; gap: 10px; margin-bottom: 30px;">
        <input type="text" id="search-input" 
               placeholder="Buscar tweets, usuarios o #hashtags..." 
               style="flex: 1; padding: 10px; border: 1px solid #e1e4e8; border-radius: 6px; font-size: 16px;">
        <button type="submit" style="background-color: #2ea44f; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;">
            Buscar
        </button>
    </form>
    
    <!-- Titulo de resultados se actualiza via JavaScript -->
    <h2 id="resultados-titulo">Resultados</h2>
    
    <!-- Contenedor para resultados via API -->
    <div id="resultados-container">
        <p style="text-align: center; color: #586069;">Realiza una busqueda para ver resultados.</p>
    </div>
</div>

<!-- Cargar el script de API de tweets -->
<script src="{% static 'js/tweets-api.js' %}"></script>

<!-- Script para manejar la busqueda con fetch -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('search-form');
    const input = document.getElementById('search-input');
    const titulo = document.getElementById('resultados-titulo');
    
    // Verificar si hay parametro de busqueda en la URL
    const urlParams = new URLSearchParams(window.location.search);
    const queryParam = urlParams.get('q');
    if (queryParam) {
        input.value = queryParam;
        titulo.textContent = `Resultados para: "${queryParam}"`;
        buscarTweets(queryParam, 'resultados-container');
    }
    
    // Interceptar envio del formulario
    form.addEventListener('submit', function(e) {
        e.preventDefault();  // Evitar envio tradicional
        const query = input.value.trim();
        if (query) {
            titulo.textContent = `Resultados para: "${query}"`;
            buscarTweets(query, 'resultados-container');
        }
    });
});
</script>
{% endblock %}
