{% extends 'base.html' %}

{% block contenido %}
<div class="hashtags-container">
    <h2>Hashtags</h2>
    
    <div id="hashtags-lista">
        <div class="loading">Cargando hashtags...</div>
    </div>
    
    <div id="hashtag-posts" style="display:none; margin-top: 20px; border-top: 2px solid #ccc; padding-top: 20px;">
        <h3 id="hashtag-titulo"></h3>
        <button onclick="volverHashtags()" style="margin-bottom: 15px; padding: 8px 16px; cursor: pointer;">⬅ Volver</button>
        <div id="posts-hashtag"></div>
    </div>
</div>

<script>
function getCSRFToken() {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
        const [name, value] = cookie.trim().split('=');
        if (name === 'csrftoken') return value;
    }
    return '';
}

function cargarHashtags() {
    fetch('/posts/api/hashtags/')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('hashtags-lista');
            
            if (!data.hashtags || data.hashtags.length === 0) {
                container.innerHTML = '<p>No hay hashtags disponibles</p>';
                return;
            }
            
            container.innerHTML = data.hashtags.map(h => `
                <div class="hashtag-card" onclick="verHashtag('${h.nombre}')" style="
                    display: inline-block;
                    margin: 8px;
                    padding: 12px 20px;
                    border: 2px solid #4A90D9;
                    border-radius: 20px;
                    cursor: pointer;
                    transition: all 0.3s;
                ">
                    <span style="font-weight: bold;">#${h.nombre}</span>
                    <span style="margin-left: 8px; color: #666;">${h.cantidad} posts</span>
                </div>
            `).join('');
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('hashtags-lista').innerHTML = 
                '<p style="color: red;">Error al cargar hashtags</p>';
        });
}

function verHashtag(tema) {
    document.getElementById('hashtags-lista').style.display = 'none';
    document.getElementById('hashtag-posts').style.display = 'block';
    document.getElementById('hashtag-titulo').textContent = `#${tema}`;
    document.getElementById('posts-hashtag').innerHTML = '<div class="loading">Cargando posts...</div>';
    
    fetch(`/posts/api/hashtags/${tema}/`)
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('posts-hashtag');
            
            if (!data.posts || data.posts.length === 0) {
                container.innerHTML = '<p>No hay posts con este hashtag</p>';
                return;
            }
            
            container.innerHTML = data.posts.map(post => `
                <div class="post-card" style="
                    border: 1px solid #ddd;
                    border-radius: 8px;
                    padding: 16px;
                    margin: 12px 0;
                ">
                    <strong>@${post.autor}</strong>
                    <small style="color: #666; margin-left: 8px;">${post.fecha}</small>
                    <p style="margin: 8px 0;">${post.contenido}</p>
                </div>
            `).join('');
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('posts-hashtag').innerHTML = 
                '<p style="color: red;">Error al cargar posts</p>';
        });
}

function volverHashtags() {
    document.getElementById('hashtags-lista').style.display = 'block';
    document.getElementById('hashtag-posts').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', function() {
    cargarHashtags();
});
</script>
{% endblock %}
